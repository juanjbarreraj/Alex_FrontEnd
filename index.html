<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./stylesheets/style.css" />

  <link href="https://fonts.googleapis.com/css?family=Nunito:400,600,700,800" rel="stylesheet" />
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" />

  <title>Restaurants Directory</title>
</head>

<body>
  <main class="page restaurants-page">

    <header class="page-header text-center py-4">
      <div class="container">
        <p class="page-subtitle">Pittsburgh Restaurant Manager</p>
        <h1 class="page-title">Restaurants Directory</h1>
        <p class="page-subtitle">
          Browse, search, add, and update restaurant records connected to your PostgreSQL database.
        </p>

        <div class="action-buttons d-flex flex-wrap justify-content-center mt-4">
          <button class="btn btn-primary action-btn" onclick="window.location.href='RestaurantsAdd.html'">
            + Add Restaurant
          </button>

          <button class="btn btn-secondary action-btn" onclick="window.location.href='RestaurantsUpdate.html'">
            Update Restaurant
          </button>
        </div>
      </div>
    </header>

    <section class="page-content">
      <div class="container">
        <div class="table-section">
          <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <div>
              <h2 style="font-weight: 800; margin-bottom: 4px;">Restaurant Records</h2>
              <p class="page-subtitle" style="text-align:left; margin:0;">
                Live data from the Render PostgreSQL database.
              </p>
            </div>
          </div>

          <div id="table"></div>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="./js/jquery.toaster.js"></script>
  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
  <script src="./js/getRestaurants.js"></script>
</body>
</html>
