<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Update Restaurant</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css?family=Nunito:400,600,700,800,900" rel="stylesheet" />

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./stylesheets/style.css" />
</head>

<body>
  <main class="site-page form-page">

    <!-- NAVBAR -->
    <nav class="restaurant-navbar">
      <div class="container nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-mark">R</span>
          <span class="brand-text">Steel City Bites</span>
        </a>

        <div class="nav-links">
          <a href="index.html">Directory</a>
          <a href="RestaurantsAdd.html">Add Restaurant</a>
          <a href="RestaurantsUpdate.html">Update</a>
        </div>
      </div>
    </nav>

    <!-- FORM HERO -->
    <header class="form-hero">
      <div class="container">
        <div class="form-hero-content reveal">
          <p class="eyebrow">Edit an existing listing</p>
          <h1>Update Restaurant</h1>
          <p>
            Select a restaurant from the database and update its information.
          </p>
        </div>
      </div>
    </header>

    <!-- FORM SECTION -->
    <section class="form-section">
      <div class="container">

        <div class="form-shell reveal delay-1">

          <div class="form-side update-side">
            <div class="form-side-card">
              <span class="side-icon">📝</span>
              <h2>Update Records</h2>
              <p>
                Choose a restaurant, edit the details, and submit the changes to keep your directory current.
              </p>

              <button class="btn btn-outline-light-custom" onclick="window.location.href='index.html'" type="button">
                Back to Directory
              </button>
            </div>
          </div>

          <form class="form restaurant-form">

            <div class="form-group">
              <label for="id">Select Restaurant</label>
              <select name="id" id="id" class="form-control">
                <option value="">Loading restaurants...</option>
              </select>
            </div>

            <div class="form-group">
              <label for="restaurant_name">Restaurant Name</label>
              <input
                name="restaurant_name"
                id="restaurant_name"
                type="text"
                class="form-control"
                placeholder="Enter restaurant name"
              />
            </div>

            <div class="form-group">
              <label for="rating">Rating</label>
              <input
                name="rating"
                id="rating"
                type="number"
                min="1"
                max="5"
                class="form-control"
                placeholder="Enter a rating from 1 to 5"
              />
            </div>

            <div class="form-group">
              <label for="location">Location</label>
              <input
                name="location"
                id="location"
                type="text"
                class="form-control"
                placeholder="Example: Downtown, Oakland, Shadyside"
              />
            </div>

            <div class="form-group">
              <label for="type">Type / Cuisine</label>
              <input
                name="type"
                id="type"
                type="text"
                class="form-control"
                placeholder="Example: Italian, Mexican, American"
              />
            </div>

            <button type="submit" class="btn btn-primary-custom btn-lg btn-block">
              Update Restaurant
            </button>

          </form>

        </div>

      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="./js/jquery.toaster.js"></script>

  <!-- Load Restaurants into dropdown -->
  <script>
    (async function loadRestaurants() {
      const select = document.getElementById("id");

      try {
        const res = await fetch("https://restaurantsbackend-us4c.onrender.com/api/v1/restaurants");
        const restaurants = await res.json();

        select.innerHTML = "";

        if (!restaurants || restaurants.length === 0) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.text = "No restaurants found";
          select.appendChild(opt);
          return;
        }

        restaurants.forEach((r) => {
          const opt = document.createElement("option");
          opt.value = r.id;
          opt.text = `${r.id} — ${r.restaurant_name}`;
          select.appendChild(opt);
        });
      } catch (error) {
        select.innerHTML = "";
        const opt = document.createElement("option");
        opt.value = "";
        opt.text = "Could not load restaurants";
        select.appendChild(opt);
        console.error("Error loading restaurants:", error);
      }
    })();
  </script>

  <!-- Update API -->
  <script src="./js/updateRestaurants.js"></script>

  <!-- Fade-in animation script -->
  <script>
    const revealElements = document.querySelectorAll(".reveal");

    const revealObserver = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
          }
        });
      },
      {
        threshold: 0.15
      }
    );

    revealElements.forEach(element => {
      revealObserver.observe(element);
    });
  </script>
</body>
</html>
